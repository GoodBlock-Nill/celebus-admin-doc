<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- Pink-Purple Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0030;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff1493;stop-opacity:1" />
    </linearGradient>

    <!-- Glow filter for sparkle -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="0" y="0" width="200" height="200" rx="40" fill="url(#bgGradient)"/>

  <!-- Rising arrow (stylized U+L form) -->
  <path
    d="M 60 150 L 100 50 L 140 150 L 125 150 L 100 80 L 75 150 Z"
    fill="#ffffff"
    opacity="0.9"
  />

  <!-- 4-point sparkle at arrow tip -->
  <g filter="url(#glow)">
    <!-- Vertical beam -->
    <ellipse cx="100" cy="45" rx="3" ry="15" fill="#ffffff"/>
    <!-- Horizontal beam -->
    <ellipse cx="100" cy="45" rx="15" ry="3" fill="#ffffff"/>
    <!-- Diagonal beam 1 -->
    <ellipse cx="100" cy="45" rx="3" ry="15" fill="#ffffff" transform="rotate(45 100 45)"/>
    <!-- Diagonal beam 2 -->
    <ellipse cx="100" cy="45" rx="3" ry="15" fill="#ffffff" transform="rotate(-45 100 45)"/>
  </g>

  <!-- Accent dots around sparkle -->
  <circle cx="85" cy="38" r="3" fill="#ffffff" opacity="0.6"/>
  <circle cx="115" cy="42" r="4" fill="#ffffff" opacity="0.5"/>
  <circle cx="105" cy="32" r="3" fill="#ffffff" opacity="0.7"/>

  <!-- Small U:L text at bottom -->
  <text
    x="100"
    y="185"
    font-family="Arial, sans-serif"
    font-size="10"
    font-weight="bold"
    fill="#ffffff"
    opacity="0.5"
    text-anchor="middle"
  >U:L</text>
</svg>
